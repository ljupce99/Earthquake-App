spring.application.name=Earthquake
# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/earthquakedb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# USGS API
usgs.api.url=https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson

# Filter settings
earthquake.filter.min-magnitude=0.0

# Scheduler interval in minutes (1 = every minute, 60 = every hour)
earthquake.scheduler.rate-minutes=5
earthquake.scheduler.enabled=true

# CORS
app.cors.allowed-origins=http://localhost:3005

# Logging
logging.level.mk.codeit.earthquake=INFO
logging.level.org.springframework.web=WARN

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=codeit.mk.earthquake.controller
springdoc.paths-to-match=/api/**
