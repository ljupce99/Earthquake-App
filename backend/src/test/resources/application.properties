# Keep scheduler disabled in tests to avoid background calls to external services
earthquake.scheduler.enabled=false

# Required by UsgsApiService bean initialization
usgs.api.url=https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson

# H2-backed test defaults
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

